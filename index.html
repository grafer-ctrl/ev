<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Online Analisa Teknikal</title>
    <!-- TradingView Lightweight Charts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #000000;
            --text-color: #ffffff;
            --accent-blue: #1e90ff;
            --accent-pink: #ff1493;
            --accent-gold: #ffd700;
            --accent-aqua: #00ffff;
            --success: #26a69a;
            --danger: #ef5350;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--container-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1f2a45;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2a45;
            padding-bottom: 12px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-api {
            background-color: rgba(0, 255, 0, 0.1);
            color: #55ff55;
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        .status-mock {
            background-color: rgba(255, 165, 0, 0.1);
            color: #ffaa00;
            border: 1px solid rgba(255, 165, 0, 0.2);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .charts-wrapper {
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1f2a45;
            display: flex;
            flex-direction: column;
            height: 650px;
        }

        .chart-pane {
            width: 100%;
            position: relative;
        }

        #main-chart {
            flex: 5.5;
            min-height: 280px;
        }

        #sub-chart {
            flex: 3.5;
            min-height: 160px;
            border-top: 1px solid #1f2a45;
        }

        /* Strength Panel */
        .strength-panel {
            background: #0a0e1a;
            border: 1px solid #1f2a45;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 2px;
        }

        .strength-item {
            flex: 1;
            min-width: 80px;
            text-align: center;
            padding: 8px 6px;
            border-radius: 8px;
            background: #131b2e;
            border: 1px solid #1f2a45;
        }

        .strength-item .label {
            font-size: 10px;
            color: #787b86;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .strength-item .value {
            font-size: 22px;
            font-weight: 800;
            margin-top: 2px;
        }

        .value-sell { color: #ef5350; }
        .value-neutral { color: #ffd700; }
        .value-buy { color: #26a69a; }

        .strength-divider {
            width: 1px;
            height: 40px;
            background: #1f2a45;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
                margin: 0;
                background-color: #000000;
            }
            .container {
                padding: 10px 5px;
                border-radius: 0;
                border: none;
                max-width: 100%;
                background-color: #000000;
            }
            header {
                padding: 5px 10px 10px 10px;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .charts-wrapper {
                height: 480px;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
            #main-chart {
                flex: 5;
                min-height: 250px;
            }
            #sub-chart {
                flex: 4;
                min-height: 150px;
            }
            .controls-panel {
                padding: 10px;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
            .btn-refresh {
                margin-left: 0;
                width: 100%;
            }
            .strength-panel {
                padding: 10px 8px;
                gap: 6px;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
            .strength-item {
                min-width: 60px;
                padding: 6px 4px;
            }
            .strength-item .value {
                font-size: 18px;
            }
            .strength-divider {
                height: 30px;
            }
        }

        .controls-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            background-color: #0a0e1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1f2a45;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background-color: #151d30;
            color: #9aa8c4;
            border: 1px solid #202d4a;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #1e2a45;
            color: #ffffff;
            border-color: #314470;
        }

        .btn.active {
            background-color: var(--accent-blue);
            color: #ffffff;
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(30, 144, 255, 0.4);
        }

        .btn-refresh {
            background-color: #ffd700;
            color: #000000;
            border: 1px solid #e5c100;
            margin-left: auto;
        }

        .btn-refresh:hover {
            background-color: #ffe033;
            color: #000000;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .accordion-header {
            background-color: #131b2e;
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #202d4a;
            font-size: 13px;
        }

        .accordion-content {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            background-color: #0a0e1a;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #1f2a45;
            margin-top: 5px;
        }

        .accordion-content.open {
            display: grid;
        }

        .param-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .param-group h3 {
            font-size: 12px;
            color: var(--accent-gold);
            border-bottom: 1px solid #222e50;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .param-row label {
            color: #9aa8c4;
        }

        .param-row input[type="number"] {
            background-color: #0d1222;
            border: 1px solid #2d3b5e;
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 4px;
            width: 70px;
            text-align: center;
        }

        .param-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        #alert-box {
            display: none;
            background-color: rgba(255, 0, 0, 0.1);
            color: #ff5555;
            border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>📈 Web Online Analisa Teknikal</h1>
            <div class="status-container">
                <div id="status-indicator" class="status-badge status-api">
                    <span class="pulse-dot"></span> <span id="status-text">Menghubungkan ke API...</span>
                </div>
            </div>
        </header>

        <div id="alert-box"></div>

        <!-- Charts Container Grid -->
        <div class="charts-wrapper">
            <div id="main-chart" class="chart-pane"></div>
            <div id="sub-chart" class="chart-pane"></div>
        </div>

        <!-- STRENGTH INDICATOR -->
        <div class="strength-panel">
            <div class="strength-item">
                <div class="label">SELL</div>
                <div class="value value-sell" id="strength-sell">0%</div>
            </div>
            <div class="strength-divider"></div>
            <div class="strength-item">
                <div class="label">NEUTRAL</div>
                <div class="value value-neutral" id="strength-neutral">0%</div>
            </div>
            <div class="strength-divider"></div>
            <div class="strength-item">
                <div class="label">BUY</div>
                <div class="value value-buy" id="strength-buy">0%</div>
            </div>
        </div>

        <!-- Controls Panel -->
        <div class="controls-panel">
            <div class="controls-row">
                <!-- Pair Selector -->
                <button class="btn active" id="pair-gbpusd" onclick="setPair('GBP/USD')">GBP/USD</button>
                <button class="btn" id="pair-eurusd" onclick="setPair('EUR/USD')">EUR/USD</button>
                
                <!-- Timeframe Selector - ONLY H1, H4, D1 -->
                <button class="btn active" id="tf-h1" onclick="setTimeframe('1h', 'H1')">H1</button>
                <button class="btn" id="tf-h4" onclick="setTimeframe('4h', 'H4')">H4</button>
                <button class="btn" id="tf-d1" onclick="setTimeframe('1day', 'D1')">D1</button>

                <!-- Refresh Action -->
                <button class="btn btn-refresh" onclick="triggerRefresh()">🔄 REFRESH API</button>
            </div>

            <!-- Parameters Toggle Accordion -->
            <div class="accordion-header" onclick="toggleParams()">
                <span>⚙️ Parameter Input (Klik untuk Atur Indikator)</span>
                <span id="accordion-arrow">▼</span>
            </div>
            <div class="accordion-content" id="params-panel">
                <!-- Main Chart Config -->
                <div class="param-group">
                    <h3>Atur Envelopes (Main Chart)</h3>
                    <div class="param-row">
                        <label>Period</label>
                        <input type="number" id="inp-ma-period" value="14" onchange="recalculateAndRender()">
                    </div>
                    <div class="param-row">
                        <label>Deviation (%)</label>
                        <input type="number" id="inp-ma-dev" value="0.10" step="0.01" onchange="recalculateAndRender()">
                    </div>
                </div>

                <!-- Sub Window VBox Config -->
                <div class="param-group">
                    <h3>Atur VBox & Level (Sub-Window)</h3>
                    <div class="param-row">
                        <label>Lookback Period</label>
                        <input type="number" id="inp-vbox-lookback" value="14" onchange="recalculateAndRender()">
                    </div>
                    <div class="param-row">
                        <label>Smooth Period</label>
                        <input type="number" id="inp-vbox-smooth" value="3" onchange="recalculateAndRender()">
                    </div>
                    <div class="param-row">
                        <label>High Level (Sell Limit)</label>
                        <input type="number" id="inp-vbox-high" value="80" onchange="recalculateAndRender()">
                    </div>
                    <div class="param-row">
                        <label>Low Level (Buy Limit)</label>
                        <input type="number" id="inp-vbox-low" value="15" onchange="recalculateAndRender()">
                    </div>
                </div>

                <!-- Sub Window Envelopes Config -->
                <div class="param-group">
                    <h3>Atur Envelopes (Sub-Window)</h3>
                    <div class="param-row">
                        <label>Aktifkan Filter Envelopes</label>
                        <input type="checkbox" id="inp-env-filter" checked onchange="recalculateAndRender()">
                    </div>
                    <div class="param-row">
                        <label>MA Period</label>
                        <input type="number" id="inp-env-period" value="14" onchange="recalculateAndRender()">
                    </div>
                    <div class="param-row">
                        <label>Deviation (%)</label>
                        <input type="number" id="inp-env-dev" value="20.0" step="0.5" onchange="recalculateAndRender()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentPair = 'GBP/USD';
        let currentInterval = '1h'; 
        let currentLabel = 'H1';
        let rawPriceData = []; 
        const twelveDataApiKey = '8cd5e84fa4564322b907aaddac29b059';

        // DOM refs untuk strength
        const strengthSell = document.getElementById('strength-sell');
        const strengthNeutral = document.getElementById('strength-neutral');
        const strengthBuy = document.getElementById('strength-buy');

        // ----------------- INTI CHART RENDERING -----------------
        const mainContainer = document.getElementById('main-chart');
        const subContainer = document.getElementById('sub-chart');

        const mainChart = LightweightCharts.createChart(mainContainer, {
            layout: { 
                background: { type: 'solid', color: '#000000' }, 
                textColor: '#cccccc' 
            },
            grid: {
                vertLines: { color: 'rgba(40, 40, 40, 0.4)' },
                horzLines: { color: 'rgba(40, 40, 40, 0.4)' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            priceScale: { 
                borderColor: '#1f2a45',
                autoScale: true, 
            },
            timeScale: { visible: false, borderColor: '#1f2a45' },
            handleScale: {
                axisPressedMouseMove: {
                    time: true,
                    price: false,
                },
                axisDoubleClickReset: {
                    time: true,
                    price: true,
                },
                mouseWheel: false,
                pinch: false,
            },
            handleScroll: {
                mouseWheel: false,
                pressedMouseMove: true,
                horzTouchDrag: true,
                vertTouchDrag: false,
            }
        });

        const subChart = LightweightCharts.createChart(subContainer, {
            layout: { 
                background: { type: 'solid', color: '#000000' }, 
                textColor: '#cccccc' 
            },
            grid: {
                vertLines: { color: 'rgba(40, 40, 40, 0.4)' },
                horzLines: { color: 'rgba(40, 40, 40, 0.4)' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            priceScale: { 
                borderColor: '#1f2a45',
                autoScale: true,
            },
            timeScale: { borderColor: '#1f2a45' },
            handleScale: {
                axisPressedMouseMove: {
                    time: true,
                    price: false,
                },
                axisDoubleClickReset: {
                    time: true,
                    price: true,
                },
                mouseWheel: false,
                pinch: false,
            },
            handleScroll: {
                mouseWheel: false,
                pressedMouseMove: true,
                horzTouchDrag: true,
                vertTouchDrag: false,
            }
        });

        // Series untuk Main Chart
        const candlestickSeries = mainChart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350',
            borderUpColor: '#26a69a',
            borderDownColor: '#ef5350',
        });

        const boxHistSeries = mainChart.addAreaSeries({
            topColor: 'rgba(186, 85, 211, 0.45)', 
            bottomColor: 'rgba(186, 85, 211, 0.45)',
            lineColor: 'transparent',
            lineWidth: 0,
            priceLineVisible: false,
            lastValueVisible: false,
        });

        const mainEnvMiddle = mainChart.addLineSeries({ color: '#1e90ff', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
        const mainEnvUpper = mainChart.addLineSeries({ color: '#ff1493', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
        const mainEnvLower = mainChart.addLineSeries({ color: '#ffffff', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });

        // Series untuk Sub-Window
        const subHistogram = subChart.addHistogramSeries({
            base: 0,
            priceLineVisible: false,
            lastValueVisible: false,
        });

        const subLevelHigh = subChart.addLineSeries({ color: '#ffd700', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, priceLineVisible: false, lastValueVisible: false });
        const subLevelLow = subChart.addLineSeries({ color: '#00ffff', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, priceLineVisible: false, lastValueVisible: false });

        const subEnvUpper = subChart.addLineSeries({ color: '#00ff00', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted, priceLineVisible: false, lastValueVisible: false });
        const subEnvLower = subChart.addLineSeries({ color: '#ff0000', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted, priceLineVisible: false, lastValueVisible: false });

        const subBoundary0 = subChart.addLineSeries({ color: 'transparent', lineWidth: 0, priceLineVisible: false, lastValueVisible: false });
        const subBoundary100 = subChart.addLineSeries({ color: 'transparent', lineWidth: 0, priceLineVisible: false, lastValueVisible: false });

        // Sinkronisasi
        let isSyncing = false;
        mainChart.timeScale().subscribeVisibleTimeRangeChange((range) => {
            if (isSyncing) return;
            isSyncing = true;
            subChart.timeScale().setVisibleRange(range);
            isSyncing = false;
        });

        subChart.timeScale().subscribeVisibleTimeRangeChange((range) => {
            if (isSyncing) return;
            isSyncing = true;
            mainChart.timeScale().setVisibleRange(range);
            isSyncing = false;
        });

        const resizeObserver = new ResizeObserver((entries) => {
            for (let entry of entries) {
                const { width, height } = entry.contentRect;
                if (width === 0 || height === 0) continue;
                if (entry.target.id === 'main-chart') {
                    mainChart.resize(width, height);
                } else if (entry.target.id === 'sub-chart') {
                    subChart.resize(width, height);
                }
            }
        });
        resizeObserver.observe(mainContainer);
        resizeObserver.observe(subContainer);

        // ----------------- UI FUNCTIONS -----------------
        function setPair(pair) {
            currentPair = pair;
            document.getElementById('pair-gbpusd').classList.toggle('active', pair === 'GBP/USD');
            document.getElementById('pair-eurusd').classList.toggle('active', pair === 'EUR/USD');
            fetchMarketData();
        }

        function setTimeframe(tf, label) {
            currentInterval = tf;
            currentLabel = label;
            
            // Hanya H1, H4, D1
            const tfs = ['h1', 'h4', 'd1'];
            tfs.forEach(t => {
                document.getElementById(`tf-${t}`).classList.toggle('active', `tf-${t}` === `tf-${tf.toLowerCase()}`);
            });

            fetchMarketData();
        }

        function toggleParams() {
            const panel = document.getElementById('params-panel');
            const arrow = document.getElementById('accordion-arrow');
            panel.classList.toggle('open');
            arrow.textContent = panel.classList.contains('open') ? '▲' : '▼';
        }

        function showMessage(msg, type = 'error') {
            const box = document.getElementById('alert-box');
            if (msg) {
                box.textContent = msg;
                box.style.display = 'block';
                if (type === 'info') {
                    box.style.backgroundColor = 'rgba(30, 144, 255, 0.1)';
                    box.style.borderColor = 'rgba(30, 144, 255, 0.2)';
                    box.style.color = '#7dc0ff';
                } else {
                    box.style.backgroundColor = 'rgba(255, 0, 0, 0.1)';
                    box.style.borderColor = 'rgba(255, 0, 0, 0.2)';
                    box.style.color = '#ff5555';
                }
            } else {
                box.style.display = 'none';
            }
        }

        function triggerRefresh() {
            fetchMarketData();
        }

        // ----------------- AMBIL DATA -----------------
        async function fetchMarketData() {
            const statusIndicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            statusIndicator.className = "status-badge status-api";
            statusText.textContent = "Mengambil data...";
            showMessage(null);

            try {
                const response = await fetch(`https://api.twelvedata.com/time_series?symbol=${currentPair}&interval=${currentInterval}&outputsize=200&apikey=${twelveDataApiKey}`);
                const data = await response.json();

                if (data.status === 'error') {
                    throw new Error(data.message || 'API rate limit exceeded.');
                }

                if (!data.values || data.values.length === 0) {
                    throw new Error("Gagal menerima nilai data dari API.");
                }

                rawPriceData = data.values.reverse().map(d => ({
                    time: parseDatetime(d.datetime),
                    open: parseFloat(d.open),
                    high: parseFloat(d.high),
                    low: parseFloat(d.low),
                    close: parseFloat(d.close),
                    volume: parseInt(d.volume || 0)
                }));

                statusIndicator.className = "status-badge status-api";
                statusText.textContent = "API Terkoneksi (Real-time)";
                
                recalculateAndRender();

            } catch (err) {
                console.warn("Kesalahan API, menggunakan Fallback Data Simulasi: ", err.message);
                
                rawPriceData = generateSimulatedData(currentPair, currentInterval, 200);
                
                statusIndicator.className = "status-badge status-mock";
                statusText.textContent = "Data Simulasi (Batas Limit API)";
                showMessage(`Memuat Data Simulasi karena: ${err.message}. Hubungkan kunci API berbayar untuk akses berkelanjutan tanpa limit.`, 'info');
                
                recalculateAndRender();
            }
        }

        function parseDatetime(datetimeStr) {
            const parts = datetimeStr.split(' ');
            if (parts.length === 2) {
                const [year, month, day] = parts[0].split('-').map(Number);
                const [hour, minute, second] = parts[1].split(':').map(Number);
                return Math.floor(new Date(year, month - 1, day, hour, minute, second).getTime() / 1000);
            } else {
                const [year, month, day] = parts[0].split('-').map(Number);
                return Math.floor(new Date(year, month - 1, day, 0, 0, 0).getTime() / 1000);
            }
        }

        function generateSimulatedData(pair, interval, count) {
            const data = [];
            let price = pair === 'GBP/USD' ? 1.2500 : 1.0800;
            let secondsPerBar = 3600; 
            if (interval === '1h') secondsPerBar = 3600;
            else if (interval === '4h') secondsPerBar = 14400;
            else if (interval === '1day') secondsPerBar = 86400;

            let time = Math.floor(Date.now() / 1000) - count * secondsPerBar;

            for (let i = 0; i < count; i++) {
                const change = (Math.random() - 0.495) * (price * 0.001);
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.random() * (price * 0.0005);
                const low = Math.min(open, close) - Math.random() * (price * 0.0005);
                const volume = Math.floor(Math.random() * 8000) + 1500;

                data.push({ time, open, high, low, close, volume });
                price = close;
                time += secondsPerBar;
            }
            return data;
        }

        // ----------------- KALKULASI INDIKATOR -----------------

        function recalculateAndRender() {
            if (rawPriceData.length === 0) return;

            const maPeriod = parseInt(document.getElementById('inp-ma-period').value) || 14;
            const maDev = parseFloat(document.getElementById('inp-ma-dev').value) || 0.10;

            const lookback = parseInt(document.getElementById('inp-vbox-lookback').value) || 14;
            const smooth = parseInt(document.getElementById('inp-vbox-smooth').value) || 3;
            const highLevel = parseFloat(document.getElementById('inp-vbox-high').value) || 80;
            const lowLevel = parseFloat(document.getElementById('inp-vbox-low').value) || 15;

            const useEnvFilter = document.getElementById('inp-env-filter').checked;
            const envPeriod = parseInt(document.getElementById('inp-env-period').value) || 14;
            const envDev = parseFloat(document.getElementById('inp-env-dev').value) || 20.0;

            // 1. Candle Utama
            candlestickSeries.setData(rawPriceData);

            // 2. Box Histogram Ungu
            const mainBoxData = rawPriceData.map(d => ({
                time: d.time,
                value: d.low
            }));
            boxHistSeries.setData(mainBoxData);

            // 3. Envelopes Main
            const mainEnv = calculateStandardEnvelopes(rawPriceData, maPeriod, maDev);
            mainEnvMiddle.setData(mainEnv.middle);
            mainEnvUpper.setData(mainEnv.upper);
            mainEnvLower.setData(mainEnv.lower);

            // 4. VBox Sub-Window
            const vboxValues = calculateVBoxIndicator(rawPriceData, lookback, smooth);

            const subHistData = [];
            for (let i = 0; i < rawPriceData.length; i++) {
                const isBull = rawPriceData[i].close >= rawPriceData[i].open;
                subHistData.push({
                    time: rawPriceData[i].time,
                    value: vboxValues[i],
                    color: isBull ? '#1e90ff' : '#ff1493'
                });
            }
            subHistogram.setData(subHistData);

            // 5. Level Statis
            const levelHighData = rawPriceData.map(d => ({ time: d.time, value: highLevel }));
            const levelLowData = rawPriceData.map(d => ({ time: d.time, value: lowLevel }));
            subLevelHigh.setData(levelHighData);
            subLevelLow.setData(levelLowData);

            const b0 = rawPriceData.map(d => ({ time: d.time, value: 0 }));
            const b100 = rawPriceData.map(d => ({ time: d.time, value: 100 }));
            subBoundary0.setData(b0);
            subBoundary100.setData(b100);

            // 6. Envelopes Sub-Window & Sinyal
            const subEnv = calculateSubWindowEnvelopesAndSignals(
                rawPriceData, 
                vboxValues, 
                envPeriod, 
                envDev, 
                highLevel, 
                lowLevel, 
                useEnvFilter
            );

            subEnvUpper.setData(subEnv.upper);
            subEnvLower.setData(subEnv.lower);

            subLevelLow.setMarkers(subEnv.buyMarkers);
            subLevelHigh.setMarkers(subEnv.sellMarkers);

            // 7. HITUNG KEKUATAN (SELL / NEUTRAL / BUY)
            const strength = calculateStrengthPercentages(vboxValues, 14);
            strengthSell.textContent = strength.sell + '%';
            strengthNeutral.textContent = strength.neutral + '%';
            strengthBuy.textContent = strength.buy + '%';
        }

        // ----------------- FUNGSI INDIKATOR -----------------

        function calculateStandardEnvelopes(data, period, dev) {
            const middle = [];
            const upper = [];
            const lower = [];

            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) continue;

                let sum = 0;
                for (let j = 0; j < period; j++) {
                    sum += data[i - j].close;
                }
                const ma = sum / period;

                middle.push({ time: data[i].time, value: ma });
                upper.push({ time: data[i].time, value: ma * (1.0 + dev / 100.0) });
                lower.push({ time: data[i].time, value: ma * (1.0 - dev / 100.0) });
            }

            return { middle, upper, lower };
        }

        function calculateVBoxIndicator(data, lookback, smooth) {
            const rawVBox = [];

            for (let i = 0; i < data.length; i++) {
                if (i < lookback - 1) {
                    rawVBox.push(50.0);
                    continue;
                }

                let highestHigh = data[i].high;
                let lowestLow = data[i].low;

                for (let k = 1; k < lookback; k++) {
                    const idx = i - k;
                    if (data[idx].high > highestHigh) highestHigh = data[idx].high;
                    if (data[idx].low < lowestLow) lowestLow = data[idx].low;
                }

                const range = highestHigh - lowestLow;
                let posClose = 50.0;
                if (range > 0) {
                    posClose = ((data[i].close - lowestLow) / range) * 100.0;
                }
                rawVBox.push(Math.max(0.0, Math.min(100.0, posClose)));
            }

            const smoothedVBox = [];
            for (let i = 0; i < rawVBox.length; i++) {
                if (smooth <= 1 || i < smooth - 1) {
                    smoothedVBox.push(rawVBox[i]);
                    continue;
                }

                let sum = 0;
                for (let s = 0; s < smooth; s++) {
                    sum += rawVBox[i - s];
                }
                smoothedVBox.push(sum / smooth);
            }

            return smoothedVBox;
        }

        function calculateSubWindowEnvelopesAndSignals(data, vbox, envPeriod, envDev, highLevel, lowLevel, useFilter) {
            const upper = [];
            const lower = [];
            const buyMarkers = [];
            const sellMarkers = [];

            for (let i = 0; i < vbox.length; i++) {
                let upVal = NaN;
                let dnVal = NaN;

                if (i >= envPeriod - 1) {
                    let sum = 0;
                    for (let k = 0; k < envPeriod; k++) {
                        sum += vbox[i - k];
                    }
                    const baseMA = sum / envPeriod;

                    upVal = baseMA * (1.0 + envDev / 100.0);
                    dnVal = baseMA * (1.0 - envDev / 100.0);

                    upVal = Math.min(100.0, upVal);
                    dnVal = Math.max(0.0, dnVal);

                    upper.push({ time: data[i].time, value: upVal });
                    lower.push({ time: data[i].time, value: dnVal });
                }

                const currentVal = vbox[i];
                let isBuy = currentVal <= lowLevel;
                let isSell = currentVal >= highLevel;

                if (useFilter && !isNaN(upVal) && !isNaN(dnVal)) {
                    isBuy = isBuy && (currentVal <= dnVal);
                    isSell = isSell && (currentVal >= upVal);
                } else if (useFilter && (isNaN(upVal) || isNaN(dnVal))) {
                    isBuy = false;
                    isSell = false;
                }

                if (isBuy) {
                    buyMarkers.push({
                        time: data[i].time,
                        position: 'atBar',
                        color: '#ffffff',
                        shape: 'arrowUp',
                        size: 2
                    });
                } else if (isSell) {
                    sellMarkers.push({
                        time: data[i].time,
                        position: 'atBar',
                        color: '#ff0000',
                        shape: 'arrowDown',
                        size: 2
                    });
                }
            }

            return { 
                upper: upper.filter(d => !isNaN(d.value)), 
                lower: lower.filter(d => !isNaN(d.value)), 
                buyMarkers, 
                sellMarkers 
            };
        }

        // ----------------- FUNGSI HITUNG KEKUATAN -----------------
        function calculateStrengthPercentages(vbox, lookback = 14) {
            if (vbox.length < lookback) {
                return { sell: 0, neutral: 0, buy: 0 };
            }

            let totalSell = 0, totalNeutral = 0, totalBuy = 0;
            const start = vbox.length - lookback;

            for (let i = start; i < vbox.length; i++) {
                const val = vbox[i];
                if (val > 55) {
                    totalBuy += (val - 50);
                } else if (val < 45) {
                    totalSell += (50 - val);
                } else {
                    totalNeutral += 1;
                }
            }

            totalNeutral = Math.max(totalNeutral, 0.1);
            
            const total = totalSell + totalNeutral + totalBuy;
            if (total === 0) {
                return { sell: 33, neutral: 34, buy: 33 };
            }

            return {
                sell: Math.round((totalSell / total) * 100),
                neutral: Math.round((totalNeutral / total) * 100),
                buy: Math.round((totalBuy / total) * 100)
            };
        }

        // Mulai aplikasi
        fetchMarketData();
    </script>
